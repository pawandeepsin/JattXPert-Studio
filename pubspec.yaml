name: jx_studio_pro
description: International JX Studio with Sidhu Moosewala Alerts
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+8
  audioplayers: ^5.2.1        # For Moosewala Sound
  lottie: ^3.1.2              # For Cartoon Animation
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0        # For Professional Fonts
  animate_do: ^3.3.4          # For Smooth UI Transitions

flutter:
  uses-material-design: true
  assets:
    - assets/                 # Yeh line tere sound aur animation ko app mein layegi

